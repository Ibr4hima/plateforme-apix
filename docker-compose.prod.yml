services:

  postgres:
    image: postgis/postgis:15-3.3
    container_name: apix_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - apix_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apix_backend_prod
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_ENFORCED: ${AUTH_ENFORCED:-false}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      DEV_EMAILS: ${DEV_EMAILS:-ibra.ba@apix.sn,ibrahima.28@outlook.com}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEBUG: "false"
      UNCTAD_CLIENT_ID: ${UNCTAD_CLIENT_ID:-}
      UNCTAD_CLIENT_SECRET: ${UNCTAD_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Persiste les fichiers téléversés (PDF du code des investissements,
      # fichiers des projets, zones…) à travers les rebuilds/redéploiements.
      # Sans ce volume, l'image backend est reconstruite à chaque déploiement et
      # les uploads sont perdus → téléchargements en « Internal Server Error ».
      - backend_uploads:/app/uploads
    networks:
      - apix_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_FORCE_ZOOM: ${NEXT_PUBLIC_FORCE_ZOOM:-}
        NEXT_PUBLIC_AUTH_ENFORCED: ${AUTH_ENFORCED:-false}
    container_name: apix_frontend_prod
    restart: unless-stopped
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_ENFORCED: ${AUTH_ENFORCED:-false}
      DEV_EMAILS: ${DEV_EMAILS:-ibra.ba@apix.sn,ibrahima.28@outlook.com}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    networks:
      - apix_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: apix_caddy_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - frontend
      - backend
    networks:
      - apix_net

networks:
  apix_net:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
  caddy_data:
  caddy_config:
