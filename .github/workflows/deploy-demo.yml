name: Déploiement démo

# Redéploie la démo à chaque publication sur main (git sync-main).
# Les commits qui ne touchent que l'app mobile ne concernent pas la
# plateforme web : ils ne déclenchent aucun déploiement.
on:
  push:
    branches:
      - main
    paths-ignore:
      - "mobile/**"
  workflow_dispatch: {}

concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier la configuration
        id: check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Secret DEPLOY_HOST absent — déploiement ignoré (configurez les secrets pour l'activer)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Déploiement SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all --prune
            git reset --hard origin/main
            bash scripts/deploy.sh
